version = 1

# REUSE.toml itself
[[annotations]]
path = ["REUSE.toml"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 UnionTech Software Technology Co., Ltd."
SPDX-License-Identifier = "CC0-1.0"

# ci
[[annotations]]
path = [".github/**", ".obs/workflows.yml"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 UnionTech Software Technology Co., Ltd."
SPDX-License-Identifier = "CC0-1.0"

